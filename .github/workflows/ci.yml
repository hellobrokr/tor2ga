name: tor2ga CI — End-to-End Marketplace Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich scikit-learn numpy fastapi uvicorn httpx

      - name: Initialize database
        run: python core/tor2ga.py init

      - name: Create users
        run: |
          python core/tor2ga.py user create --username lister1 --email lister@test.com --role lister
          python core/tor2ga.py user create --username owner1 --email owner@test.com --role agent_owner
          python core/tor2ga.py user list

      - name: Post jobs
        run: |
          python core/tor2ga.py job post --lister lister1 \
            --title "Research AI agent market" \
            --description "Comprehensive analysis of AI agent platforms, market size, key players, and growth trends with data tables" \
            --bounty 500 --category research \
            --skills "research,analysis,market-intelligence" --priority high

          python core/tor2ga.py job post --lister lister1 \
            --title "Build REST API microservice" \
            --description "Create a FastAPI microservice with CRUD endpoints, JWT auth, rate limiting, and OpenAPI documentation" \
            --bounty 800 --category code \
            --skills "python,fastapi,api-design,testing" --priority urgent

          python core/tor2ga.py job post --lister lister1 \
            --title "Customer churn prediction model" \
            --description "Build a churn prediction pipeline with feature engineering, XGBoost model, SHAP explainability, and evaluation metrics" \
            --bounty 650 --category analysis \
            --skills "python,ml,xgboost,data-science" --priority high

          python core/tor2ga.py job list

      - name: Register agents
        run: |
          python core/tor2ga.py agent register --owner owner1 \
            --name "ResearchBot-CI" \
            --description "Research and competitive intelligence agent" \
            --capabilities "research,analysis,market-intelligence,writing"

          python core/tor2ga.py agent register --owner owner1 \
            --name "CodeBot-CI" \
            --description "Full-stack code generation agent" \
            --capabilities "python,fastapi,api-design,testing,code"

          python core/tor2ga.py agent register --owner owner1 \
            --name "DataBot-CI" \
            --description "Data science and ML engineering agent" \
            --capabilities "python,ml,xgboost,data-science,analytics"

          python core/tor2ga.py agent list

      - name: Auto-match all jobs
        run: python core/tor2ga.py match --auto

      - name: Execute all matched jobs
        run: |
          for JOB_ID in $(python -c "
          import sqlite3, pathlib
          db = pathlib.Path.home() / '.tor2ga' / 'marketplace.db'
          conn = sqlite3.connect(str(db))
          rows = conn.execute(\"SELECT id FROM jobs WHERE status='matched'\").fetchall()
          for r in rows: print(r[0][:8])
          "); do
            echo "--- Executing job $JOB_ID ---"
            python core/tor2ga.py execute --job-id "$JOB_ID"
          done

      - name: Verify all executions
        run: |
          for JOB_ID in $(python -c "
          import sqlite3, pathlib
          db = pathlib.Path.home() / '.tor2ga' / 'marketplace.db'
          conn = sqlite3.connect(str(db))
          rows = conn.execute(\"SELECT id FROM jobs WHERE status='submitted'\").fetchall()
          for r in rows: print(r[0][:8])
          "); do
            echo "--- Verifying job $JOB_ID ---"
            python core/tor2ga.py verify --job-id "$JOB_ID"
          done

      - name: Process all payouts (80/20 split)
        run: python core/tor2ga.py pay --all

      - name: Validate final state
        run: |
          echo "=== Marketplace Status ==="
          python core/tor2ga.py status

          echo ""
          echo "=== Leaderboard ==="
          python core/tor2ga.py leaderboard

          echo ""
          echo "=== Transaction History ==="
          python core/tor2ga.py history

          echo ""
          echo "=== Assertions ==="
          python -c "
          import sqlite3, pathlib, sys
          db = pathlib.Path.home() / '.tor2ga' / 'marketplace.db'
          conn = sqlite3.connect(str(db))

          paid = conn.execute(\"SELECT COUNT(*) FROM jobs WHERE status='paid'\").fetchone()[0]
          assert paid == 3, f'Expected 3 paid jobs, got {paid}'
          print(f'✓ {paid}/3 jobs paid')

          total = conn.execute(\"SELECT SUM(amount_usd) FROM transactions WHERE tx_type='escrow'\").fetchone()[0]
          assert abs(total - 1950.0) < 0.01, f'Expected \$1950 escrow, got {total}'
          print(f'✓ Total escrow: \${total:.2f}')

          payouts = conn.execute(\"SELECT SUM(amount_usd) FROM transactions WHERE tx_type='payout_agent_owner'\").fetchone()[0]
          assert abs(payouts - 1560.0) < 0.01, f'Expected \$1560 payouts, got {payouts}'
          print(f'✓ Agent payouts: \${payouts:.2f} (80%)')

          fees = conn.execute(\"SELECT SUM(amount_usd) FROM transactions WHERE tx_type='platform_fee'\").fetchone()[0]
          assert abs(fees - 390.0) < 0.01, f'Expected \$390 fees, got {fees}'
          print(f'✓ Platform fees: \${fees:.2f} (20%)')

          balance = conn.execute(\"SELECT balance_usd FROM users WHERE username='owner1'\").fetchone()[0]
          assert abs(balance - 1560.0) < 0.01, f'Expected \$1560 balance, got {balance}'
          print(f'✓ Owner balance: \${balance:.2f}')

          agents = conn.execute(\"SELECT name, jobs_completed FROM agents\").fetchall()
          total_completed = sum(a[1] for a in agents)
          assert total_completed == 3, f'Expected 3 completed, got {total_completed}'
          print(f'✓ {total_completed}/3 agent completions')

          print()
          print('All assertions passed.')
          "

  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich scikit-learn numpy fastapi uvicorn httpx

      - name: Initialize database
        run: python core/tor2ga.py init

      - name: Start API server
        run: |
          cd core && python server.py &
          sleep 3
          curl -s http://localhost:8420/health | python -m json.tool

      - name: Run API integration test
        run: |
          python -c "
          import httpx, json, sys

          BASE = 'http://localhost:8420'
          c = httpx.Client(base_url=BASE, timeout=30)

          r = c.get('/health')
          assert r.status_code == 200
          print('✓ Health check passed')

          alice = c.post('/api/v1/auth/register', json={
              'username': 'alice_ci', 'email': 'alice@ci.test', 'role': 'lister'
          }).json()
          bob = c.post('/api/v1/auth/register', json={
              'username': 'bob_ci', 'email': 'bob@ci.test', 'role': 'agent_owner'
          }).json()
          print(f'✓ Users created: {alice[\"username\"]}, {bob[\"username\"]}')

          job = c.post('/api/v1/jobs', json={
              'title': 'CI Test Research',
              'description': 'Automated test job for CI pipeline validation',
              'category': 'research',
              'skills_required': ['testing', 'ci'],
              'bounty_usd': 100.0,
              'priority': 'high'
          }, headers={'X-API-Key': alice['api_key']}).json()
          assert 'id' in job
          print(f'✓ Job posted: {job[\"id\"][:8]}')

          agent = c.post('/api/v1/agents', json={
              'name': 'CI-TestBot',
              'description': 'CI testing agent',
              'capabilities': ['testing', 'ci', 'research']
          }, headers={'X-API-Key': bob['api_key']}).json()
          assert 'id' in agent
          print(f'✓ Agent registered: {agent[\"id\"][:8]}')

          claim = c.post('/api/v1/marketplace/claim', json={
              'agent_id': agent['id']
          }, headers={'X-API-Key': bob['api_key']}).json()
          assert claim.get('claimed') == True
          print(f'✓ Job claimed')

          submit = c.post('/api/v1/marketplace/submit', json={
              'job_id': job['id'],
              'agent_id': agent['id'],
              'output_text': '# CI Test Report\n\n## Summary\nAutomated CI test validating the full marketplace pipeline.\n\n## Findings\n1. Job posting works correctly\n2. Agent registration works correctly\n3. Matching and claiming works correctly\n4. Submission and verification works correctly\n5. Payout processing works correctly\n\n## Data Analysis\n- Total endpoints tested: 14\n- Success rate: 100%\n- Average response time: under 50ms\n\n## Recommendations\nAll systems operational. Pipeline validated successfully.'
          }, headers={'X-API-Key': bob['api_key']}).json()
          assert submit.get('verification', {}).get('passed') == True
          print(f'✓ Verified (score: {submit[\"verification\"][\"score\"]})')

          payout = submit.get('payout', {})
          assert payout.get('agent_payout_usd') == 80.0
          assert payout.get('platform_fee_usd') == 20.0
          print(f'✓ Payout: \${payout[\"agent_payout_usd\"]} agent / \${payout[\"platform_fee_usd\"]} platform')

          stats = c.get('/api/v1/stats').json()
          assert stats['paid_jobs'] == 1
          print(f'✓ Stats: {stats[\"paid_jobs\"]} paid, \${stats[\"total_volume\"]} volume')

          board = c.get('/api/v1/leaderboard').json()
          assert len(board) == 1
          print(f'✓ Leaderboard: #{board[0][\"rank\"]} {board[0][\"name\"]}')

          print()
          print('All API tests passed.')
          "

  stripe-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install stripe rich scikit-learn numpy

      - name: Stripe connection smoke test
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          python -c "
          import stripe, os, sys

          key = os.environ.get('STRIPE_SECRET_KEY', '')
          if not key:
              print('⚠ STRIPE_SECRET_KEY not set — skipping Stripe tests')
              sys.exit(0)

          stripe.api_key = key

          # 1. Verify account access
          account = stripe.Account.retrieve()
          print(f'✓ Stripe connected: {account.settings.dashboard.display_name}')
          print(f'  Account ID: {account.id}')
          print(f'  Country: {account.country}')
          print(f'  Charges enabled: {account.charges_enabled}')
          print(f'  Payouts enabled: {account.payouts_enabled}')

          # 2. Verify balance access
          balance = stripe.Balance.retrieve()
          for b in balance.available:
              print(f'  Balance ({b.currency.upper()}): \${b.amount / 100:.2f} available')

          # 3. Verify Connect is accessible
          try:
              accounts = stripe.Account.list(limit=1)
              print(f'✓ Connect API accessible ({len(accounts.data)} connected accounts)')
          except stripe.error.PermissionError:
              print('⚠ Connect not enabled on this account (not required for marketplace core)')

          # 4. Verify stripe_payments.py module loads
          sys.path.insert(0, 'core')
          from stripe_payments import StripePayments
          sp = StripePayments(
              stripe_secret_key=key,
              platform_account_id=account.id
          )
          print(f'✓ StripePayments module initialized')
          print(f'  Mode: {\"LIVE\" if \"live\" in key else \"TEST\"}')

          print()
          print('Stripe smoke test passed.')
          "
